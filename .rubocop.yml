---
plugins:
  - rubocop-factory_bot
  - rubocop-performance
  - rubocop-rails
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  Exclude:
    - bin/*
    - gemfiles/*
    - spec/dummy/**/*

#########
# STYLE #
#########

Style/Documentation:
  Enabled: false

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma

Style/BlockDelimiters:
  AllowedPatterns: ['expect']

Style/OneClassPerFile:
  Exclude:
    - spec/support/datatables/datatable_cond_date.rb
    - spec/support/datatables/datatable_cond_numeric.rb
    - spec/support/datatables/datatable_cond_string.rb

##########
# LAYOUT #
##########

Layout/LineLength:
  Max: 150
  Exclude:
    - ajax-datatables-rails.gemspec

Layout/EmptyLines:
  Enabled: false

Layout/EmptyLineBetweenDefs:
  Enabled: false

Layout/EmptyLinesAroundClassBody:
  Enabled: false

Layout/EmptyLinesAroundBlockBody:
  Enabled: false

Layout/EmptyLinesAroundModuleBody:
  Enabled: false

Layout/HashAlignment:
  EnforcedColonStyle: table
  EnforcedHashRocketStyle: table

##########
# NAMING #
##########

Naming/FileName:
  Exclude:
    - lib/ajax-datatables-rails.rb

#########
# RAILS #
#########

# The spec dummy models subclass ActiveRecord::Base directly; the Combustion
# dummy app has no ApplicationRecord base class to inherit from.
Rails/ApplicationRecord:
  Exclude:
    - spec/support/models/**/*

#########
# RSPEC #
#########

RSpec/MultipleExpectations:
  Max: 7

RSpec/NestedGroups:
  Max: 6

RSpec/ExampleLength:
  Max: 9

RSpec/MultipleMemoizedHelpers:
  Max: 6

RSpec/NotToNot:
  EnforcedStyle: to_not
